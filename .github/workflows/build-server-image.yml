name: Build Server Image

on:
  pull_request:
    paths:
      - 'backend/**'
      - 'frontend_app/**'
      - 'frontend_admin/**'
      - '.github/workflows/build-server-image.yml'
  push:
    branches: [ main ]
    tags:
      - 'v*'
    paths:
      - 'backend/**'
      - 'frontend_app/**'
      - 'frontend_admin/**'
      - '.github/workflows/build-server-image.yml'
  workflow_dispatch:

jobs:
  docker-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image coordinates
        id: image
        shell: bash
        run: |
          echo "ghcr=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/mindmapvault-server" >> "$GITHUB_OUTPUT"
          if [ -n "${{ vars.DOCKERHUB_NAMESPACE }}" ]; then
            echo "dockerhub=docker.io/${{ vars.DOCKERHUB_NAMESPACE }}/mindmapvault-server" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ steps.image.outputs.ghcr }}
            ${{ steps.image.outputs.dockerhub }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request' && vars.DOCKERHUB_NAMESPACE != ''
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and optionally push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Publish usage summary
        shell: bash
        run: |
          {
            echo "## Server Image"
            echo ""
            echo "GHCR image: \`${{ steps.image.outputs.ghcr }}\`"
            if [ -n "${{ steps.image.outputs.dockerhub }}" ]; then
              echo "Docker Hub image: \`${{ steps.image.outputs.dockerhub }}\`"
            fi
            echo ""
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              echo "This run validated the Docker build without pushing an image."
            else
              echo "This run pushed image tags to the configured registries:"
              echo ""
              echo '```'
              echo "${{ steps.meta.outputs.tags }}"
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"