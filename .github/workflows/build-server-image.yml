name: Build Server Image

on:
  pull_request:
    paths:
      - 'backend/**'
      - 'frontend_app/**'
      - 'frontend_admin/**'
      - '.github/workflows/build-server-image.yml'
  push:
    branches: [ main ]
    tags:
      - 'v*'
    paths:
      - 'backend/**'
      - 'frontend_app/**'
      - 'frontend_admin/**'
      - '.github/workflows/build-server-image.yml'
  workflow_dispatch:

jobs:
  docker-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Read app version
        id: app_version
        shell: bash
        run: |
          version="$(sed -n 's/^version = "\([^"]*\)"$/\1/p' backend/Cargo.toml | head -n1)"
          if [ -z "$version" ]; then
            echo "Failed to read backend version from backend/Cargo.toml" >&2
            exit 1
          fi
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Compute image coordinates
        id: image
        shell: bash
        run: |
          echo "ghcr=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/mindmapvault-server" >> "$GITHUB_OUTPUT"

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ steps.image.outputs.ghcr }}
          tags: |
            type=raw,value=${{ steps.app_version.outputs.value }},enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and optionally push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Publish usage summary
        shell: bash
        run: |
          {
            echo "## Server Image"
            echo ""
            echo "GHCR image: \`${{ steps.image.outputs.ghcr }}\`"
            echo "Docker Hub publishing is handled separately by scripts/publish_dockerhub/publish-to-dockerhub.sh."
            echo ""
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              echo "This run validated the Docker build without pushing an image."
            else
              echo "This run pushed image tags to the configured registries:"
              echo ""
              echo '```'
              echo "${{ steps.meta.outputs.tags }}"
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"