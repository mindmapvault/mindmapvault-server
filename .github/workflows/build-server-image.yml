name: Build Server Image

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

on:
  pull_request:
    paths:
      - 'backend/**'
      - 'frontend_app/**'
      - 'frontend_admin/**'
      - '.github/workflows/build-server-image.yml'
  push:
    branches: [ main ]
    tags:
      - 'v*'
    paths:
      - 'backend/**'
      - 'frontend_app/**'
      - 'frontend_admin/**'
      - '.github/workflows/build-server-image.yml'
  workflow_dispatch:

jobs:
  docker-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image coordinates
        id: image
        shell: bash
        run: |
          echo "ghcr=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/mindmapvault-server" >> "$GITHUB_OUTPUT"

          dockerhub_namespace="${{ vars.DOCKERHUB_NAMESPACE }}"
          if [ -z "$dockerhub_namespace" ] && [ -n "${{ secrets.DOCKERHUB_USERNAME }}" ]; then
            dockerhub_namespace="${{ secrets.DOCKERHUB_USERNAME }}"
          fi

          if [ -n "$dockerhub_namespace" ]; then
            dockerhub_namespace="${dockerhub_namespace,,}"
            echo "dockerhub=docker.io/${dockerhub_namespace}/mindmapvault-server" >> "$GITHUB_OUTPUT"
            echo "dockerhub_enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "dockerhub_enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ steps.image.outputs.ghcr }}
            ${{ steps.image.outputs.dockerhub }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate Docker Hub credentials
        if: github.event_name != 'pull_request' && steps.image.outputs.dockerhub_enabled == 'true'
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          username="$(printf '%s' "$DOCKERHUB_USERNAME" | tr -d '\r\n')"
          token="$(printf '%s' "$DOCKERHUB_TOKEN" | tr -d '\r\n')"

          # Trim optional accidental wrapping quotes from secret values.
          username="${username%\"}"
          username="${username#\"}"
          username="${username%\'}"
          username="${username#\'}"
          token="${token%\"}"
          token="${token#\"}"
          token="${token%\'}"
          token="${token#\'}"

          if [ -z "$username" ]; then
            echo "DOCKERHUB_USERNAME is empty."
            exit 1
          fi

          if [ -z "$token" ]; then
            echo "DOCKERHUB_TOKEN is empty."
            exit 1
          fi

          # Docker Hub login expects account/org name only, not repository/image references.
          if [[ "$username" == *"/"* ]] || [[ "$username" == *":"* ]] || [[ "$username" == *"@"* ]] || [[ "$username" == *"docker.io"* ]]; then
            echo "DOCKERHUB_USERNAME looks invalid: use only the Docker Hub account/org name (example: kornelko2)."
            exit 1
          fi

          # Newlines or spaces in credentials frequently cause malformed Authorization header errors.
          if [[ "$username" =~ [[:space:]] ]]; then
            echo "DOCKERHUB_USERNAME contains whitespace; remove spaces/newlines."
            exit 1
          fi

          if [[ "$token" =~ [[:space:]] ]]; then
            echo "DOCKERHUB_TOKEN contains whitespace; regenerate and paste the token without spaces/newlines."
            exit 1
          fi

          # Keep validation permissive to avoid rejecting valid Docker Hub usernames.
          # We only block clearly malformed values that break registry auth.
          if [[ "$username" == "." ]] || [[ "$username" == "-" ]] || [[ "$username" == "_" ]]; then
            echo "DOCKERHUB_USERNAME looks invalid; use your Docker Hub account/org name (example: kornelko2)."
            exit 1
          fi

          if [[ ! "$username" =~ ^[A-Za-z0-9_-]+$ ]]; then
            echo "DOCKERHUB_USERNAME contains unsupported characters; use only letters, digits, '_' or '-'."
            exit 1
          fi

          if [[ ! "$token" =~ ^[[:graph:]]+$ ]]; then
            echo "DOCKERHUB_TOKEN contains non-printable characters; regenerate and paste a clean token."
            exit 1
          fi

          if [[ ! "$token" =~ ^dckr_pat_[A-Za-z0-9._-]+$ ]]; then
            echo "DOCKERHUB_TOKEN must be a Docker Hub Personal Access Token (expected prefix: dckr_pat_)."
            exit 1
          fi

      - name: Log in to Docker Hub (CLI)
        if: github.event_name != 'pull_request' && steps.image.outputs.dockerhub_enabled == 'true'
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          username="$(printf '%s' "$DOCKERHUB_USERNAME" | tr -d '\r\n')"
          token="$(printf '%s' "$DOCKERHUB_TOKEN" | tr -d '\r\n')"
          username="${username%\"}"
          username="${username#\"}"
          username="${username%\'}"
          username="${username#\'}"
          token="${token%\"}"
          token="${token#\"}"
          token="${token%\'}"
          token="${token#\'}"

          # Ensure no stale Docker Hub auth entry interferes with the fresh login attempt.
          docker logout docker.io >/dev/null 2>&1 || true
          docker logout https://index.docker.io/v1/ >/dev/null 2>&1 || true

          # First try the canonical docker.io endpoint.
          if printf '%s' "$token" | docker login docker.io -u "$username" --password-stdin; then
            exit 0
          fi

          echo "Primary Docker Hub login endpoint failed; retrying with index.docker.io/v1/."

          # Retry using the legacy index endpoint accepted by some Docker clients/flows.
          printf '%s' "$token" | docker login https://index.docker.io/v1/ -u "$username" --password-stdin

      - name: Build and optionally push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Publish usage summary
        shell: bash
        run: |
          {
            echo "## Server Image"
            echo ""
            echo "GHCR image: \`${{ steps.image.outputs.ghcr }}\`"
            if [ -n "${{ steps.image.outputs.dockerhub }}" ]; then
              echo "Docker Hub image: \`${{ steps.image.outputs.dockerhub }}\`"
            else
              echo "Docker Hub image: not configured (set DOCKERHUB_NAMESPACE or DOCKERHUB_USERNAME/DOCKERHUB_TOKEN)."
            fi
            echo ""
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              echo "This run validated the Docker build without pushing an image."
            else
              echo "This run pushed image tags to the configured registries:"
              echo ""
              echo '```'
              echo "${{ steps.meta.outputs.tags }}"
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"