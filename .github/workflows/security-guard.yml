name: Security Guard

on:
  pull_request:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  no-committed-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Scan tracked files for committed secrets
        run: node scripts/check_no_committed_secrets.mjs

  backend-rustsec-audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run RustSec audit
        run: cargo audit

  frontend-dependency-audit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project:
          - frontend_app
          - frontend_admin
    defaults:
      run:
        working-directory: ${{ matrix.project }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Setup pnpm via Corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.17.1 --activate
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Run dependency audit
        run: pnpm audit

  security-guard-report:
    runs-on: ubuntu-latest
    if: always()
    needs:
      - no-committed-secrets
      - backend-rustsec-audit
      - frontend-dependency-audit
    steps:
      - name: Generate workflow report
        env:
          NO_COMMITTED_SECRETS_RESULT: ${{ needs.no-committed-secrets.result }}
          BACKEND_AUDIT_RESULT: ${{ needs.backend-rustsec-audit.result }}
          FRONTEND_AUDIT_RESULT: ${{ needs.frontend-dependency-audit.result }}
          GITHUB_REPOSITORY_NAME: ${{ github.repository }}
          GITHUB_RUN_ID_VALUE: ${{ github.run_id }}
          GITHUB_RUN_NUMBER_VALUE: ${{ github.run_number }}
          GITHUB_SHA_VALUE: ${{ github.sha }}
          GITHUB_REF_NAME_VALUE: ${{ github.ref_name }}
          GITHUB_ACTOR_VALUE: ${{ github.actor }}
          GITHUB_SERVER_URL_VALUE: ${{ github.server_url }}
        run: |
          report_time="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          overall_status="success"
          if [ "$NO_COMMITTED_SECRETS_RESULT" != "success" ] || [ "$BACKEND_AUDIT_RESULT" != "success" ] || [ "$FRONTEND_AUDIT_RESULT" != "success" ]; then
            overall_status="failure"
          fi

          cat > security-guard-report.md <<EOF
          # Security Guard Report

          Generated at (UTC): $report_time
          Repository: $GITHUB_REPOSITORY_NAME
          Run number: $GITHUB_RUN_NUMBER_VALUE
          Run ID: $GITHUB_RUN_ID_VALUE
          Commit: $GITHUB_SHA_VALUE
          Branch: $GITHUB_REF_NAME_VALUE
          Triggered by: $GITHUB_ACTOR_VALUE
          Overall status: $overall_status
          Run URL: $GITHUB_SERVER_URL_VALUE/$GITHUB_REPOSITORY_NAME/actions/runs/$GITHUB_RUN_ID_VALUE

          ## Job Results

          - no-committed-secrets: $NO_COMMITTED_SECRETS_RESULT
          - backend-rustsec-audit: $BACKEND_AUDIT_RESULT
          - frontend-dependency-audit (matrix): $FRONTEND_AUDIT_RESULT
          EOF

          cat security-guard-report.md >> "$GITHUB_STEP_SUMMARY"
