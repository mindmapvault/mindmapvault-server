name: Frontend Offline Parity

on:
  pull_request:
    paths:
      - 'frontend_app/**'
      - 'scripts/check_frontend_offline_parity.mjs'
      - '.github/workflows/offline-parity.yml'
  push:
    branches: [ main ]
    paths:
      - 'frontend_app/**'
      - 'scripts/check_frontend_offline_parity.mjs'
      - '.github/workflows/offline-parity.yml'
  workflow_dispatch:

jobs:
  offline-parity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Server
        uses: actions/checkout@v4

      - name: Checkout FOSS counterpart
        uses: actions/checkout@v4
        with:
          repository: mindmapvault/mindmapvault-foss
          path: foss-repo
          token: ${{ secrets.MMV_CROSS_REPO_PAT }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run offline parity check
        run: node scripts/check_frontend_offline_parity.mjs --foss-root=foss-repo --server-root=.
