services:
  postgres:
    image: postgres:16-bookworm
    container_name: mindmapvault-server-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mindmapvault
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.deploy}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mindmapvault"]
      interval: 10s
      timeout: 5s
      retries: 10

  garage:
    image: dxflrs/garage:v2.3.0
    container_name: mindmapvault-server-garage
    restart: unless-stopped
    command: /garage server --single-node --default-bucket
    environment:
      GARAGE_DEFAULT_ACCESS_KEY: ${S3_ACCESS_KEY:?Set S3_ACCESS_KEY in .env.deploy}
      GARAGE_DEFAULT_SECRET_KEY: ${S3_SECRET_KEY:?Set S3_SECRET_KEY in .env.deploy}
      GARAGE_DEFAULT_BUCKET: ${GARAGE_BUCKET:-mindmapvault}
    ports:
      - "9000:3900"
      - "3901:3901"
      - "3903:3903"
    volumes:
      - ./garage.toml:/etc/garage.toml:ro
      - garage-meta:/var/lib/garage/meta
      - garage-data:/var/lib/garage/data
    healthcheck:
      test: ["CMD", "/garage", "-c", "/etc/garage.toml", "status"]
      interval: 10s
      timeout: 5s
      retries: 10

  server:
    # Pin a version tag for production, e.g. kornelko2/mindmapvault-server:0.3.26
    image: ${SERVER_IMAGE:-kornelko2/mindmapvault-server:latest}
    container_name: mindmapvault-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      garage:
        condition: service_healthy
    environment:
      HOST: 0.0.0.0
      PORT: 8090
      DB_ENGINE: postgres

      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.deploy}
      POSTGRES_DB: mindmapvault
      POSTGRES_PORT: 5432
      POSTGRES_DSN: postgresql://postgres:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.deploy}@postgres:5432/mindmapvault

      S3_ENDPOINT: http://garage:3900
      S3_PUBLIC_ENDPOINT: http://localhost:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:?Set S3_ACCESS_KEY in .env.deploy}
      S3_SECRET_KEY: ${S3_SECRET_KEY:?Set S3_SECRET_KEY in .env.deploy}
      S3_BUCKET: ${S3_BUCKET:-mindmapvault}
      S3_BASE_URL: ${S3_BASE_URL:-http://localhost:9000}
      S3_REGION: ${S3_REGION:-garage}
      S3_PRESIGN_EXPIRY_SECS: ${S3_PRESIGN_EXPIRY_SECS:-3600}

      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env.deploy}
      JWT_ACCESS_EXPIRY_SECS: ${JWT_ACCESS_EXPIRY_SECS:-900}
      JWT_REFRESH_EXPIRY_SECS: ${JWT_REFRESH_EXPIRY_SECS:-2592000}
      ADMIN_API_TOKEN: ${ADMIN_API_TOKEN:?Set ADMIN_API_TOKEN in .env.deploy}

      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:1420,http://tauri.localhost,https://tauri.localhost}
      RUST_LOG: ${RUST_LOG:-backend=debug,tower_http=info}
    ports:
      - "8090:8090"

volumes:
  postgres-data:
  garage-meta:
  garage-data:
