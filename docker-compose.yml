services:
  postgres:
    image: postgres:16-bookworm
    container_name: mindmapvault-server-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mindmapvault
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d mindmapvault']
      interval: 10s
      timeout: 5s
      retries: 10

  garage:
    image: dxflrs/garage:v2.3.0
    container_name: mindmapvault-server-garage
    restart: unless-stopped
    command: /garage server --single-node --default-bucket
    environment:
      # Shared local credentials for the Garage S3 endpoint.
      GARAGE_DEFAULT_ACCESS_KEY: ${GARAGE_ACCESS_KEY:-garage-access-key}
      GARAGE_DEFAULT_SECRET_KEY: ${GARAGE_SECRET_KEY:-garage-secret-key}
      GARAGE_DEFAULT_BUCKET: ${GARAGE_BUCKET:-mindmapvault}
    ports:
      - '9000:3900'
      - '3901:3901'
      - '3903:3903'
    volumes:
      - ./docker/garage.toml:/etc/garage.toml:ro
      - garage-meta:/var/lib/garage/meta
      - garage-data:/var/lib/garage/data
    healthcheck:
      test: ['CMD', '/garage', '-c', '/etc/garage.toml', 'status']
      interval: 10s
      timeout: 5s
      retries: 10

  server:
    image: ${SERVER_IMAGE:-mindmapvault-server:local}
    container_name: mindmapvault-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      garage:
        condition: service_healthy
    # Edit the values below directly for local container runs.
    # The backend `.env` file is kept only for direct source-based runs.
    environment:
      # Backend bind address inside the container.
      HOST: 0.0.0.0
      PORT: 8090
      DB_ENGINE: postgres

      # PostgreSQL connection details for the compose-managed database.
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mindmapvault
      POSTGRES_PORT: 5432
      POSTGRES_DSN: postgresql://postgres:postgres@postgres:5432/mindmapvault

      # S3-compatible object storage settings for Garage.
      S3_ENDPOINT: http://garage:3900
      S3_PUBLIC_ENDPOINT: http://localhost:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-garage-access-key}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-garage-secret-key}
      S3_BUCKET: ${S3_BUCKET:-mindmapvault}
      S3_BASE_URL: ${S3_BASE_URL:-http://localhost:9000}
      S3_REGION: ${S3_REGION:-garage}
      S3_PRESIGN_EXPIRY_SECS: ${S3_PRESIGN_EXPIRY_SECS:-3600}

      # JWT and admin token values for the local backend.
      JWT_SECRET: ${JWT_SECRET:-change-me-jwt-secret}
      JWT_ACCESS_EXPIRY_SECS: ${JWT_ACCESS_EXPIRY_SECS:-900}
      JWT_REFRESH_EXPIRY_SECS: ${JWT_REFRESH_EXPIRY_SECS:-2592000}
      ADMIN_API_TOKEN: ${ADMIN_API_TOKEN:-change-me-admin-token}

      # Browser origins allowed to call the API during local development.
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:1420,http://tauri.localhost,https://tauri.localhost}

      # Verbose local logs for troubleshooting.
      RUST_LOG: ${RUST_LOG:-backend=debug,tower_http=info}
    ports:
      - '8090:8090'

volumes:
  postgres-data:
  garage-meta:
  garage-data: